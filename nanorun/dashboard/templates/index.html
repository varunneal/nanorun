<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>nanorun Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/style.css?v={{ v }}">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>nanorun</h1>
    </header>

    <main>
        <section class="experiments-panel" id="experiments-panel">
            <div class="collapse-handle" onclick="toggleSidebar()" title="Toggle sidebar"></div>

            <!-- Experiments View -->
            <div id="experiments-view" class="panel-view active">
                <div class="filter-bar">
                    <input type="text" id="search-filter" placeholder="Search" oninput="refreshExperiments()">
                    <select id="status-filter" onchange="refreshExperiments()">
                        <option value="">Status</option>
                        <option value="running">Running</option>
                        <option value="queued">Queued</option>
                        <option value="completed">Completed</option>
                        <option value="failed">Failed</option>
                    </select>
                    <select id="track-filter" onchange="refreshExperiments()">
                        <option value="">Track</option>
                    </select>
                </div>
                <div id="experiments-list" class="experiments-list">
                    Loading...
                </div>
            </div>

            <!-- Queue View -->
            <div id="queue-view" class="panel-view">
                <div class="queue-header">
                    <span class="queue-title">Queue</span>
                    <span id="queue-state-badge" class="queue-state-badge">active</span>
                </div>
                <div id="queue-content" class="queue-content">
                    Loading...
                </div>
            </div>

            <!-- View Switcher -->
            <div class="view-switcher">
                <button class="view-btn active" data-view="experiments" onclick="switchView('experiments')">Experiments</button>
                <button class="view-btn" data-view="queue" onclick="switchView('queue')">Queue</button>
            </div>
        </section>

        <section class="detail-panel">
            <div class="panel-header">
                <h2 id="detail-title">Details</h2>
            </div>

            <div class="meta-chart-block">
                <div class="meta-row-wrapper">
                    <div id="meta-row-container"></div>
                    <div class="chart-view-switcher" id="chart-view-switcher">
                        <button class="chart-view-btn" data-view="heatmap" onclick="switchChartView('heatmap')" title="Heatmap view">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="3" y="3" width="5" height="5" rx="1"/><rect x="10" y="3" width="5" height="5" rx="1"/><rect x="17" y="3" width="5" height="5" rx="1"/>
                                <rect x="3" y="10" width="5" height="5" rx="1"/><rect x="10" y="10" width="5" height="5" rx="1"/><rect x="17" y="10" width="5" height="5" rx="1"/>
                                <rect x="3" y="17" width="5" height="5" rx="1"/><rect x="10" y="17" width="5" height="5" rx="1"/><rect x="17" y="17" width="5" height="5" rx="1"/>
                            </svg>
                        </button>
                        <button class="chart-view-btn" data-view="residual" onclick="switchChartView('residual')" title="Residual view">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="2" y="11" width="20" height="2"/>
                                <path d="M4 8 L8 5 L12 9 L16 4 L20 7" stroke="currentColor" stroke-width="2" fill="none"/>
                                <path d="M4 16 L8 19 L12 15 L16 20 L20 17" stroke="currentColor" stroke-width="2" fill="none"/>
                            </svg>
                        </button>
                        <button class="chart-view-btn" data-view="line" onclick="switchChartView('line')" title="Line graph view">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 17 L8 12 L12 14 L17 8 L21 10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                                <circle cx="3" cy="17" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="12" cy="14" r="2"/><circle cx="17" cy="8" r="2"/><circle cx="21" cy="10" r="2"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="chart-container">
                    <div class="chart-body">
                        <div id="chart-legend" class="chart-legend"></div>
                        <div class="chart-canvas-wrap">
                            <canvas id="loss-chart"></canvas>
                            <div id="chart-heatmap-container"></div>
                        </div>
                    </div>
                    <div class="chart-toolbar">
                        <div id="chart-range" class="chart-range"></div>
                        <div class="chart-toolbar-btns">
                            <input type="text" id="chart-copy-title" class="chart-copy-title" placeholder="title (optional)" title="Title for copied image">
                            <button class="chart-copy-btn" onclick="copyChartAsImage()" title="Copy chart as image">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                            </button>
                            <button class="chart-fullscreen-btn" onclick="toggleChartFullscreen()" title="Toggle fullscreen">
                                <svg class="expand-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                                </svg>
                                <svg class="collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div><!-- .chart-container -->
            </div><!-- .meta-chart-block -->

            <div id="experiment-details" class="details-content">
                <p class="placeholder">Select an experiment to view details</p>
            </div>

            <div class="metrics-panel">
                <div id="metrics-table" class="metrics-table">
                    <h3>Metrics History</h3>
                    <p class="placeholder">Select an experiment to view metrics</p>
                </div>
            </div>

            <div class="diff-notes-panel">
                <div class="diff-notes-tabs">
                    <button class="diff-notes-tab active" data-tab="diff" onclick="switchDiffNotesTab('diff')">Code Diff</button>
                    <button class="diff-notes-tab" data-tab="notes" onclick="switchDiffNotesTab('notes')">Notes</button>
                </div>
                <div id="diff-tab-content" class="diff-notes-content active">
                    <div id="diff-content" class="diff-content">
                        <p class="placeholder">Select an experiment to view code diff</p>
                    </div>
                </div>
                <div id="notes-tab-content" class="diff-notes-content">
                    <div id="notes-content" class="notes-content">
                        <p class="placeholder">Select an experiment to view notes</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="mobile-nav">
        <button class="mobile-nav-btn active" data-panel="experiments" onclick="switchMobilePanel('experiments')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
            </svg>
            <span>Experiments</span>
        </button>
        <button class="mobile-nav-btn" data-panel="queue" onclick="switchMobilePanel('queue')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/>
            </svg>
            <span>Queue</span>
        </button>
        <button class="mobile-nav-btn" data-panel="detail" onclick="switchMobilePanel('detail')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
            <span>Details</span>
        </button>
    </nav>

    <script>
        let lossChart = null;
        let selectedExperiment = null;
        let selectedExperimentIds = null;
        let selectedRunId = null;  // Currently selected row in runs table
        let selectedCellExpIds = null;  // Experiment IDs selected via heatmap cell click
        let refreshInterval = null;
        let currentValidData = null;  // Store for metrics table switching
        let deleteInProgress = false;  // Flag to prevent auto-refresh during delete

        // Runs table sort/filter state
        let runsSort = { col: 'started_at', dir: 'desc' };
        let runsEnvFilters = {};  // { KEY: 'value', ... }
        let runsLimit = 20;
        let runsIsSweep = false;

        // Bucket state (persisted in localStorage)
        function getBucket() {
            try { return JSON.parse(localStorage.getItem('nanorun_bucket') || '[]'); }
            catch { return []; }
        }
        function saveBucket(ids) {
            localStorage.setItem('nanorun_bucket', JSON.stringify(ids));
        }
        function toggleBucketItem(expId) {
            const bucket = getBucket();
            const idx = bucket.indexOf(expId);
            if (idx >= 0) {
                bucket.splice(idx, 1);
            } else {
                bucket.push(expId);
            }
            saveBucket(bucket);
            renderBucketCard();
            // Re-render runs table if viewing bucket to update icons
            if (selectedExperiment === 'bucket') {
                selectExperiment('bucket', bucket.slice());
            }
        }
        function removeFromBucket(expId) {
            const bucket = getBucket().filter(id => id !== expId);
            saveBucket(bucket);
            renderBucketCard();
            if (selectedExperiment === 'bucket') {
                if (bucket.length === 0) {
                    selectedExperiment = null;
                    selectedExperimentIds = null;
                    document.getElementById('experiment-details').innerHTML = '';
                    document.getElementById('meta-row-container').innerHTML = '';
                    document.getElementById('detail-title').textContent = '';
                } else {
                    selectExperiment('bucket', bucket.slice());
                }
            }
        }
        function isBucketView() {
            return selectedExperiment === 'bucket';
        }

        function renderBucketCard() {
            // Remove existing bucket card
            const existing = document.getElementById('bucket-card');
            if (existing) existing.remove();

            const bucket = getBucket();
            if (bucket.length === 0) return;

            const listEl = document.getElementById('experiments-list');
            if (!listEl) return;

            const isSelected = selectedExperiment === 'bucket';
            const card = document.createElement('div');
            card.id = 'bucket-card';
            card.className = `experiment-card bucket${isSelected ? ' selected' : ''}`;
            card.dataset.id = 'bucket';
            card.onclick = () => selectExperiment('bucket', bucket.slice());
            card.innerHTML = `
                <div class="exp-header">
                    <div class="exp-name-group">
                        <span class="exp-name"><span class="exp-track bucket-label">★ Bucket</span></span>
                    </div>
                    <div class="exp-badges">
                        <span class="bucket-count">${bucket.length} run${bucket.length !== 1 ? 's' : ''}</span>
                    </div>
                </div>
            `;
            listEl.prepend(card);
        }

        function isMobile() {
            return window.innerWidth < 768;
        }

        function switchMobilePanel(panelName) {
            const sidebar = document.getElementById('experiments-panel');
            const detail = document.querySelector('.detail-panel');

            // Remove mobile-active from both
            sidebar.classList.remove('mobile-active');
            detail.classList.remove('mobile-active');

            if (panelName === 'experiments') {
                sidebar.classList.add('mobile-active');
                switchView('experiments');
            } else if (panelName === 'queue') {
                sidebar.classList.add('mobile-active');
                switchView('queue');
            } else if (panelName === 'detail') {
                detail.classList.add('mobile-active');
            }

            // Update bottom nav active state
            document.querySelectorAll('.mobile-nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.panel === panelName);
            });
        }

        async function loadDiff(codeHash) {
            const contentEl = document.getElementById('diff-content');

            if (!codeHash) {
                contentEl.innerHTML = '<p class="placeholder">No code hash available</p>';
                return;
            }

            try {
                const response = await fetch(`/api/diff/${codeHash}`);
                if (!response.ok) {
                    contentEl.innerHTML = '<p class="placeholder">No diff available (root node or diff not generated)</p>';
                    return;
                }
                const diffText = await response.text();
                contentEl.innerHTML = renderDiff(diffText);
            } catch (e) {
                contentEl.innerHTML = `<p class="placeholder">Error loading diff: ${e.message}</p>`;
            }
        }

        async function loadNotes(scriptPath) {
            const contentEl = document.getElementById('notes-content');
            const notesTab = document.querySelector('.diff-notes-tab[data-tab="notes"]');

            if (!scriptPath) {
                contentEl.innerHTML = '';
                notesTab.style.display = 'none';
                // Switch to diff if notes was selected
                if (currentDiffNotesTab === 'notes') {
                    switchDiffNotesTab('diff');
                }
                return;
            }

            try {
                const response = await fetch(`/api/notes/${encodeURIComponent(scriptPath)}`);
                if (!response.ok) {
                    contentEl.innerHTML = '';
                    notesTab.style.display = 'none';
                    // Switch to diff if notes was selected
                    if (currentDiffNotesTab === 'notes') {
                        switchDiffNotesTab('diff');
                    }
                    return;
                }
                const notesText = await response.text();
                contentEl.innerHTML = renderNotes(notesText);
                notesTab.style.display = '';
            } catch (e) {
                contentEl.innerHTML = '';
                notesTab.style.display = 'none';
                if (currentDiffNotesTab === 'notes') {
                    switchDiffNotesTab('diff');
                }
            }
        }

        let currentNotesRaw = null;

        function renderNotes(notesText) {
            if (!notesText || notesText.trim() === '') {
                currentNotesRaw = null;
                return '<p class="placeholder">Empty notes file</p>';
            }
            currentNotesRaw = notesText;
            const html = marked.parse(notesText);
            return `<div class="notes-wrapper">
                <button class="notes-copy-btn" onclick="copyNotes(this)" title="Copy notes">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                </button>
                <div class="notes-markdown">${html}</div>
            </div>`;
        }

        function copyNotes(btn) {
            if (!currentNotesRaw) return;
            copyToClipboard(currentNotesRaw, btn);
        }

        let currentDiffNotesTab = 'diff';

        function switchDiffNotesTab(tabName) {
            currentDiffNotesTab = tabName;

            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('tab', tabName);
            window.history.replaceState({}, '', url);

            // Update tab buttons
            document.querySelectorAll('.diff-notes-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });

            // Update content visibility
            document.getElementById('diff-tab-content').classList.toggle('active', tabName === 'diff');
            document.getElementById('notes-tab-content').classList.toggle('active', tabName === 'notes');
        }

        function renderDiff(diffText) {
            if (!diffText || diffText.trim() === '') {
                return '<p class="placeholder">Empty diff</p>';
            }

            const lines = diffText.split(/\r?\n/);
            const htmlLines = lines.map(line => {
                let className = 'diff-line';
                if (line.startsWith('+++') || line.startsWith('---')) {
                    className += ' diff-file';
                } else if (line.startsWith('@@')) {
                    className += ' diff-hunk';
                } else if (line.startsWith('+')) {
                    className += ' diff-add';
                } else if (line.startsWith('-')) {
                    className += ' diff-del';
                }
                // Escape HTML
                const escaped = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return `<div class="${className}">${escaped}</div>`;
            });

            return `<pre class="diff-pre">${htmlLines.join('')}</pre>`;
        }

        function formatTime(ms) {
            if (!ms) return '';
            const seconds = ms / 1000;
            if (seconds >= 1000) {
                return Math.round(seconds) + 's';
            }
            return seconds.toPrecision(3) + 's';
        }

        function formatStartedAt(isoString) {
            if (!isoString) return '-';
            // DB stores UTC times without timezone suffix. Append Z so JS interprets as UTC.
            // The getHours/getMinutes methods then convert to local timezone automatically.
            if (!/Z$/.test(isoString) && !/[+-]\d{2}:\d{2}$/.test(isoString)) {
                isoString += 'Z';
            }
            const date = new Date(isoString);
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const hour24 = date.getHours();
            const hour12 = hour24 % 12 || 12;
            const ampm = hour24 < 12 ? 'am' : 'pm';
            const mins = date.getMinutes().toString().padStart(2, '0');
            return `${month}/${day} ${hour12}:${mins}${ampm}`;
        }

        function formatValLoss(val_loss, train_time_ms) {
            if (!val_loss) return '<span class="val-loss-value">n/a</span>';
            const loss = val_loss.toFixed(4);
            if (train_time_ms) {
                return `<span class="val-loss-value">${loss}</span><span class="val-loss-at">@</span><span class="val-loss-time">${formatTime(train_time_ms)}</span>`;
            }
            return `<span class="val-loss-value">${loss}</span>`;
        }

        async function loadTracks() {
            const response = await fetch('/api/tracks');
            const data = await response.json();
            const select = document.getElementById('track-filter');

            // Keep "All Tracks" option, add discovered tracks
            data.tracks.forEach(track => {
                const option = document.createElement('option');
                option.value = track.name;
                option.textContent = track.name;
                select.appendChild(option);
            });
        }

        async function refreshExperiments() {
            const searchFilter = document.getElementById('search-filter').value.trim();
            const statusFilter = document.getElementById('status-filter').value;
            const trackFilter = document.getElementById('track-filter').value;

            const params = new URLSearchParams();
            if (trackFilter) params.set('track', trackFilter);
            if (statusFilter) params.set('status', statusFilter);
            if (searchFilter) params.set('search', searchFilter);

            const url = params.toString() ? `/api/experiments?${params}` : '/api/experiments';
            const response = await fetch(url);
            let data = await response.json();

            const listEl = document.getElementById('experiments-list');

            if (data.experiments.length === 0) {
                listEl.innerHTML = '<p class="placeholder">No experiments found. Run "nanorun run &lt;script&gt;" to start an experiment.</p>';
                return [];
            }

            listEl.innerHTML = data.experiments.map(exp => {
                const scriptPath = (exp.script || '').replace(/'/g, "\\'");
                return `
                <div class="experiment-card ${exp.status}" onclick="selectExperiment('${exp.code_hash || exp.id}', ${JSON.stringify(exp.experiment_ids || [exp.id])})" data-id="${exp.code_hash || exp.id}">
                    <div class="exp-header">
                        <div class="exp-name-group">
                            <span class="exp-name copyable" onclick="event.stopPropagation(); copyToClipboard('${scriptPath}', this)" title="Click to copy: ${exp.script || 'n/a'}"><span class="exp-track">${exp.track || 'untracked'}</span>/${exp.name.substring(0, 25)}${exp.name.length > 25 ? '…' : ''}</span>${exp.code_hash ? `<span class="exp-hash">${exp.code_hash.substring(0, 8)}</span>` : ''}
                        </div>
                        <div class="exp-badges">
                            ${exp.status !== 'completed' ? `<span class="status-badge ${exp.status}">${exp.status}</span>` : ''}
                        </div>
                    </div>
                    <div class="exp-metrics">
                        <span class="val-loss">${formatValLoss(exp.val_loss, exp.train_time_ms)}${exp.n_runs > 1 ? ` <span class="n-runs-inline">(n=${exp.n_runs})</span>` : ''}</span>
                        ${exp.status === 'running' ? `
                        <div class="exp-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${exp.total_steps ? (exp.current_step / exp.total_steps * 100) : 0}%"></div>
                            </div>
                            <span class="progress-text">${exp.current_step || 0}/${exp.total_steps || '?'}</span>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `}).join('');

            // Re-highlight selected if still in list
            if (selectedExperiment) {
                document.querySelectorAll('.experiment-card').forEach(el => {
                    el.classList.toggle('selected', el.dataset.id == selectedExperiment);
                });
            }

            renderBucketCard();

            return data.experiments;
        }

        async function selectExperiment(codeHashOrId, experimentIds) {
            selectedQueuedScript = null;  // Clear queued selection
            const isSameExperiment = selectedExperiment === codeHashOrId;
            selectedExperiment = codeHashOrId;
            selectedExperimentIds = experimentIds;

            // Only clear selections when changing to a different experiment
            if (!isSameExperiment) {
                selectedRunId = null;
                selectedCellExpIds = null;
                heatmapSelectedVars = [];
                currentChartView = null;  // Reset chart view for new experiment
            }

            // Update URL with selected experiment
            const url = new URL(window.location);
            url.searchParams.set('exp', codeHashOrId);
            // Only clear run/chart params when changing to a different experiment
            if (!isSameExperiment) {
                url.searchParams.delete('run');
                url.searchParams.delete('chart');
            }
            window.history.replaceState({}, '', url);

            // Highlight selected
            document.querySelectorAll('.experiment-card').forEach(el => {
                el.classList.toggle('selected', el.dataset.id == codeHashOrId);
            });

            // Fetch details for all experiments in the group
            const allData = await Promise.all(
                experimentIds.map(id => fetch(`/api/experiment/${id}`).then(r => r.json()))
            );

            // Filter out errors
            const validData = allData.filter(d => !d.error);
            if (validData.length === 0) {
                document.getElementById('experiment-details').innerHTML = `<p class="error">No valid experiments found</p>`;
                return;
            }

            const primary = validData[0];
            const isMultiple = validData.length > 1;

            // Load heatmap defaults for this experiment's code hash
            currentCodeHash = primary.code_hash;
            if (!isSameExperiment) {
                heatmapDefaults = loadHeatmapDefaults(currentCodeHash);
                // Auto-detect defaults from script if we have partial vars and no saved defaults
                const partialVars = detectPartialVars(validData);
                if (partialVars.length > 0 && primary.script) {
                    // Always fetch defaults for partial vars — overwrite stale (default) markers
                    const needsAutoDetect = partialVars.some(k => !heatmapDefaults[k] || heatmapDefaults[k] === '(default)');
                    if (needsAutoDetect) {
                        fetch(`/api/env-defaults/${primary.script}`).then(r => r.json()).then(data => {
                            if (data.defaults) {
                                let changed = false;
                                for (const key of partialVars) {
                                    if (data.defaults[key] !== undefined && heatmapDefaults[key] !== data.defaults[key]) {
                                        heatmapDefaults[key] = data.defaults[key];
                                        changed = true;
                                    }
                                }
                                if (changed) {
                                    saveHeatmapDefaults(currentCodeHash, heatmapDefaults);
                                    // Re-render heatmap with updated defaults
                                    if (currentChartView === 'heatmap') {
                                        switchChartView('heatmap', false);
                                    }
                                }
                            }
                        }).catch(() => {});  // Silently fail if script not found
                    }
                }
            }

            // Check if it's a sweep (different env vars)
            const envVarStrings = new Set(validData.map(d => JSON.stringify(d.env_vars || {})));
            const isSweep = envVarStrings.size > 1;

            // Compute aggregated stats (exclude running experiments from averages)
            const completedData = validData.filter(d => d.status !== 'running');
            const valLosses = completedData.map(d => d.final_val_loss).filter(v => v != null);
            const trainTimes = completedData.map(d => d.final_train_time_ms).filter(v => v != null);
            const meanValLoss = valLosses.length ? valLosses.reduce((a,b) => a+b, 0) / valLosses.length : null;

            ` : `
                <div class="meta-row">
                    <a class="meta-item meta-script" href="#" onclick="event.preventDefault(); revealInFinder(${primary.id})" title="Reveal in Finder: ${primary.script || 'n/a'}">${primary.track || 'untracked'}/${primary.script ? primary.script.split('/').pop() : 'n/a'}</a>

                    <span class="meta-item">${primary.gpus}x ${primary.gpu_type || 'H100'}</span>
                    <span class="meta-sep">·</span>

                        : `<span class="meta-item meta-hash-missing">no code hash</span>`}
                    ${isMultiple ? `<span class="meta-sep">·</span><span class="meta-item">${isSweep ? 'sweep' : 'n'}=${validData.length}</span>` : ''}
                </div>

            // Update details
            const detailsEl = document.getElementById('experiment-details');
            // Reset filters when switching experiments
            if (!isSameExperiment) {
                runsEnvFilters = {};
                runsSort = { col: 'started_at', dir: 'desc' };

            }
            const anyHasEnvVars = validData.some(d => d.env_vars && Object.keys(d.env_vars).length > 0);
            runsIsSweep = isSweep || isBucketView() || anyHasEnvVars;

            detailsEl.innerHTML = `
                <div class="stats-runs-block">
                    <div class="runs-header-row">
                        <h4 class="runs-header-clickable" onclick="copyRunsAsMarkdown()" title="Click to copy as markdown">Runs</h4>
                        <div class="stats-hero">
                            <div class="stat-box">
                                <span class="stat-label">${isMultiple ? 'Mean Loss' : 'Val Loss'}</span>
                                <span class="stat-value ${meanValLoss && meanValLoss < 3.3 ? 'good' : ''}">${meanValLoss ? meanValLoss.toFixed(4) : 'n/a'}</span>
                                ${isMultiple && valLosses.length > 1 ? `<span class="stat-range">(${Math.min(...valLosses).toFixed(4)}-${Math.max(...valLosses).toFixed(4)})</span>` : ''}
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">${isMultiple ? 'Mean Time' : 'Train Time'}</span>
                                <span class="stat-value">${meanTrainTime ? (meanTrainTime / 1000).toFixed(1) + 's' : 'n/a'}</span>
                                ${isMultiple && trainTimes.length > 1 ? `<span class="stat-range">(${(Math.min(...trainTimes)/1000).toFixed(1)}s-${(Math.max(...trainTimes)/1000).toFixed(1)}s)</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div id="runs-filters"></div>
                    <div id="runs-table-container" class="runs-table"></div>
                </div>
            `;

            // Store validData for runs table rendering and metrics table switching
            currentValidData = validData;
            currentTotalSteps = Math.max(...validData.map(d => d.total_steps || 0));

            renderRunsTable();

            // Set up chart views
            const eligibleViews = getEligibleViews(validData);
            const metaChartBlock = document.querySelector('.meta-chart-block');

            if (eligibleViews.length === 0) {
                // No views available, hide the chart component
                metaChartBlock.classList.add('no-views');
                // Clear chart param from URL
                const url = new URL(window.location);
                url.searchParams.delete('chart');
                window.history.replaceState({}, '', url);
            } else {
                metaChartBlock.classList.remove('no-views');
                updateViewSwitcher(eligibleViews);
                // Check URL for preferred chart view, then current view, fallback to first eligible
                const urlParams = new URLSearchParams(window.location.search);
                const urlChartView = urlParams.get('chart');
                const viewToShow = (urlChartView && eligibleViews.includes(urlChartView))
                    ? urlChartView
                    : (currentChartView && eligibleViews.includes(currentChartView))
                        ? currentChartView
                        : eligibleViews[0];
                switchChartView(viewToShow);
            }

            // Keep run/cell selection across refreshes when still valid
            const validIds = new Set(validData.map(d => d.id));
            if (selectedCellExpIds) {
                const filteredCellIds = selectedCellExpIds.filter(id => validIds.has(id));
                selectedCellExpIds = filteredCellIds.length > 0 ? filteredCellIds : null;
            }
            if (selectedRunId && !validIds.has(selectedRunId)) {
                selectedRunId = null;
            }

            // Update metrics table with preserved selection when possible
            if (selectedCellExpIds) {

            } else if (selectedRunId) {
                const exp = validData.find(d => d.id === selectedRunId);
                if (exp) {
                    updateMetricsTable(exp.loss_curve, false, selectedRunId);

                const allCurves = validData.map(d => d.loss_curve);

                updateMetricsTable(averaged, true, null);

                updateMetricsTable(primary.loss_curve, false, null);

            const runUrl = new URL(window.location);

        function handleRunRowClick(event, expId) {
            if (event.metaKey || event.ctrlKey) {
                event.preventDefault();
                toggleBucketItem(expId);
                // Re-render to update in-bucket styling
                if (!isBucketView()) renderRunsTable();
                return;
            }
            showMetricsForRun(expId);
        }

        function computeAveragedMetrics(allLossCurves) {
            // Group metrics by step across all runs
            const byStep = {};
            allLossCurves.forEach(curve => {
                (curve || []).forEach(m => {
                    if (!byStep[m.step]) {
                        byStep[m.step] = { val_losses: [], train_times: [], step_avgs: [] };
                    }
                    if (m.val_loss != null) byStep[m.step].val_losses.push(m.val_loss);
                    if (m.train_time_ms != null) byStep[m.step].train_times.push(m.train_time_ms);
                    if (m.step_avg_ms != null) byStep[m.step].step_avgs.push(m.step_avg_ms);
                });
            });

            // Compute averages
            const avgMetrics = Object.entries(byStep).map(([step, data]) => ({
                step: parseInt(step),
                val_loss: data.val_losses.length ? data.val_losses.reduce((a,b) => a+b, 0) / data.val_losses.length : null,
                train_time_ms: data.train_times.length ? data.train_times.reduce((a,b) => a+b, 0) / data.train_times.length : null,
                step_avg_ms: data.step_avgs.length ? data.step_avgs.reduce((a,b) => a+b, 0) / data.step_avgs.length : null,
                n: data.val_losses.length
            }));

            return avgMetrics.sort((a, b) => a.step - b.step);
        }

        function showMetricsForRun(expId) {
            if (!currentValidData) return;
            const url = new URL(window.location);

            // Clear cell selection when clicking individual rows
            selectedCellExpIds = null;

            // Toggle: if same run clicked again, deselect it
            if (selectedRunId === expId) {
                selectedRunId = null;
                url.searchParams.delete('run');
                window.history.replaceState({}, '', url);
                // Show averaged metrics if multiple runs, or single run metrics
                if (currentValidData.length > 1) {
                    showAveragedMetrics();
                } else {
                    updateMetricsTable(currentValidData[0].loss_curve, false, null);
                }
                updateRunRowHighlights();
                updateHeatmapHighlights();
                return;
            }

            const exp = currentValidData.find(d => d.id === expId);
            if (exp) {
                selectedRunId = expId;
                updateMetricsTable(exp.loss_curve, false, expId);
                // Update URL with run param (keeps exp param)
                url.searchParams.set('run', expId);
                window.history.replaceState({}, '', url);
                updateRunRowHighlights();
                updateHeatmapHighlights();
            }
        }

        function updateHeatmapHighlights() {
            document.querySelectorAll('.heatmap-cell').forEach(cell => {
                const expIds = (cell.dataset.expIds || '').split(',').map(id => parseInt(id)).filter(id => !isNaN(id));
                const isSelected = selectedCellExpIds
                    ? expIds.some(id => selectedCellExpIds.includes(id))
                    : expIds.includes(selectedRunId);
                cell.classList.toggle('selected', isSelected);
            });
        }

        function updateRunRowHighlights() {
            document.querySelectorAll('.run-row').forEach(row => {
                const rowExpId = parseInt(row.dataset.expId);
                const isSelected = selectedCellExpIds
                    ? selectedCellExpIds.includes(rowExpId)
                    : rowExpId === selectedRunId;
                row.classList.toggle('selected', isSelected);
            });
        }

        function showAveragedMetrics() {
            if (!currentValidData) return;
            const allCurves = currentValidData.map(d => d.loss_curve);
            const averaged = computeAveragedMetrics(allCurves);
            updateMetricsTable(averaged, true, null);
        }

        // Store current metrics data for clipboard copy
        let currentMetricsData = null;

        function copyMetricsAsMarkdown() {
            if (!currentMetricsData || currentMetricsData.length === 0) return;

            // Build markdown table
            const lines = [
                '| Step | Val Loss | Time | Step Avg |',
                '|------|----------|------|----------|'
            ];

            currentMetricsData.forEach(m => {
                const step = m.step;
                const valLoss = m.val_loss ? m.val_loss.toFixed(4) : '-';
                const time = m.train_time_ms ? formatTime(m.train_time_ms) : '-';
                const stepAvg = m.step_avg_ms ? m.step_avg_ms.toFixed(1) + 'ms' : '-';
                lines.push(`| ${step} | ${valLoss} | ${time} | ${stepAvg} |`);
            });

            const markdown = lines.join('\n');
            copyToClipboard(markdown, document.querySelector('.metrics-header-clickable'));
        }

        function getVisibleRuns() {
            if (!currentValidData || currentValidData.length === 0) return [];
            let data = currentValidData.slice();

            // Apply env var filters
            const filterKeys = Object.keys(runsEnvFilters);
            if (filterKeys.length > 0) {
                data = data.filter(d => {
                    const env = d.env_vars || {};
                    return filterKeys.every(k => String(env[k] ?? '') === String(runsEnvFilters[k]));
                });
            }

            // Sort
            const col = runsSort.col;
            const dir = runsSort.dir === 'asc' ? 1 : -1;
            data.sort((a, b) => {
                let va, vb;
                if (col === 'started_at') {
                    va = a.started_at || ''; vb = b.started_at || '';
                } else if (col === 'val_loss') {
                    va = a.final_val_loss ?? Infinity; vb = b.final_val_loss ?? Infinity;
                } else if (col === 'time') {
                    va = a.final_train_time_ms ?? Infinity; vb = b.final_train_time_ms ?? Infinity;
                } else if (col === 'status') {
                    va = a.status || ''; vb = b.status || '';
                } else if (col === 'id') {
                    va = a.id; vb = b.id;
                } else if (col === 'script') {
                    va = a.script || ''; vb = b.script || '';
                } else {
                    va = 0; vb = 0;
                }
                return va < vb ? -dir : va > vb ? dir : 0;
            });

            return data.slice(0, runsLimit);
        }

        function copyRunsAsMarkdown() {
            const runs = getVisibleRuns();
            if (runs.length === 0) return;

            const hasEnvVars = runs.some(d => d.env_vars && Object.keys(d.env_vars).length > 0);
            const bucket = isBucketView();

            let header, separator;
            if (bucket && hasEnvVars) {
                header = '| Script | Run | Env | Val Loss | Time |';
                separator = '|--------|-----|-----|----------|------|';
            } else if (bucket) {
                header = '| Script | Run | Val Loss | Time |';
                separator = '|--------|-----|----------|------|';
            } else if (hasEnvVars) {
                header = '| Run | Env | Val Loss | Time |';
                separator = '|-----|-----|----------|------|';
            } else {
                header = '| Run | Val Loss | Time |';
                separator = '|-----|----------|------|';
            }
            const lines = [header, separator];

            runs.forEach(d => {
                const runId = d.remote_run_id || `#${d.id}`;
                const valLoss = d.final_val_loss ? d.final_val_loss.toFixed(4) : '-';
                const time = d.final_train_time_ms ? (d.final_train_time_ms / 1000).toFixed(1) + 's' : '-';
                const script = d.script ? d.script.split('/').pop().replace('.py', '') : d.name;
                const env = Object.entries(d.env_vars || {}).map(([k, v]) => `${k}=${v}`).join(', ') || '-';

                if (bucket && hasEnvVars) {
                    lines.push(`| ${script} | ${runId} | ${env} | ${valLoss} | ${time} |`);
                } else if (bucket) {
                    lines.push(`| ${script} | ${runId} | ${valLoss} | ${time} |`);
                } else if (hasEnvVars) {
                    lines.push(`| ${runId} | ${env} | ${valLoss} | ${time} |`);
                } else {
                    lines.push(`| ${runId} | ${valLoss} | ${time} |`);
                }
            });

            const markdown = lines.join('\n');
            copyToClipboard(markdown, document.querySelector('.runs-header-clickable'));
        }

        function toggleRunsSort(col) {
            if (runsSort.col === col) {
                runsSort.dir = runsSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                runsSort.col = col;
                runsSort.dir = col === 'started_at' ? 'desc' : 'asc';
            }
            renderRunsTable();
        }

        function toggleEnvFilter(key, value) {
            if (runsEnvFilters[key] === value) {
                delete runsEnvFilters[key];
            } else {
                runsEnvFilters[key] = value;
            }
            renderRunsTable();
        }

        function clearEnvFilters() {
            runsEnvFilters = {};
            renderRunsTable();
        }

        function setRunsLimit(val) {
            const n = parseInt(val);
            if (!isNaN(n) && n > 0) runsLimit = n;
            renderRunsTable();
        }

        function makeRunsLimitEditable(el) {
            const current = runsLimit;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            input.className = 'runs-limit-inline';
            input.size = String(current).length || 2;

            const commit = () => {
                const n = parseInt(input.value);
                if (!isNaN(n) && n > 0) {
                    runsLimit = n;
                }
                renderRunsTable();
            };

            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); commit(); }
                if (e.key === 'Escape') { e.preventDefault(); renderRunsTable(); }
            });
            input.addEventListener('blur', commit);

            el.replaceWith(input);
            input.focus();
            input.select();
        }

                        <th>Run ID</th>

                        ${runsIsSweep ? `<th>Env</th>` : ''}
                        <th class="${sortCls('val_loss')}" onclick="toggleRunsSort('val_loss')">Val Loss</th>

                <tbody>

                        return `
                        <tr class="run-row${selectedRunId === d.id ? ' selected' : ''}${bucketSet.has(d.id) ? ' in-bucket' : ''}" data-exp-id="${d.id}" onclick="handleRunRowClick(event, ${d.id})" title="Click to view metrics · ⌘+click to add to bucket">
                            <td>${isBucketView() ? `<span class="exp-track">${d.track || 'untracked'}</span>/${d.script ? d.script.split('/').pop().replace('.py', '') : d.name}` : `#${d.id}`}</td>
                            <td>
                                ${d.remote_run_id
                                    ? `<a href="/api/logs/${d.remote_run_id}" target="_blank" class="meta-run-id" title="View log file" onclick="event.stopPropagation()">${d.remote_run_id}</a>`
                                    : '<span class="meta-hash-missing">none</span>'}${d.status === 'failed' && d.crash_log
                                    ? `<span class="log-sep">|</span><a href="/api/crash/${d.id}" target="_blank" class="crash-log-link" onclick="event.stopPropagation()">CRASH LOG</a>`
                                    : ''}
                            </td>

                                : `<button class="delete-icon" onclick="event.stopPropagation(); deleteExperiment(${d.id}, '${d.name.replace(/'/g, "\\'")}', this.closest('tr'))" title="Delete"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>`}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
                </table>`;

            // Update chart to reflect filtered data
            if (currentChartView) {
                switchChartView(currentChartView, false);
            }
