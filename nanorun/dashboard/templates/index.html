<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="version" content="{{ v }}">
    <title>nanorun Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg-dark: #0f1218; --bg-card: #161a24; --text-primary: #eef; --border-subtle: #333; }
        body { background: #0f1218; color: #eef; }
    </style>
    <script>
        var __theme = localStorage.getItem('nanorun-theme') || 'dark';
        document.write('<link id="theme-link" rel="stylesheet" href="/static/themes/' + __theme + '.css?v={{ v }}">');
    </script>
    <link rel="stylesheet" href="/static/style.css?v={{ v }}">
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:wght@400;500;700&family=Atkinson+Hyperlegible+Next:wght@400;500;700&family=Geist:wght@400;500;700&family=Geist+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&family=Play:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="brand-wrap">
            <h1 class="brand" onclick="toggleThemeMenu(event)">nanorun</h1>
            <div id="theme-menu" class="theme-menu hidden"></div>
        </div>
        <div class="header-chips">
            <div id="session-chips" class="session-chips"></div>
            <div id="hub-chips" class="session-chips"></div>
        </div>
    </header>

    <main>
        <section class="experiments-panel" id="experiments-panel">
            <div class="collapse-handle" onclick="toggleSidebar()" title="Toggle sidebar"></div>

            <!-- Experiments View -->
            <div id="experiments-view" class="panel-view active">
                <div class="filter-bar">
                    <input type="text" id="search-filter" placeholder="Search" oninput="refreshExperiments()">
                    <select id="status-filter" onchange="refreshExperiments()">
                        <option value="">Status</option>
                        <option value="running">Running</option>
                        <option value="queued">Queued</option>
                        <option value="completed">Completed</option>
                        <option value="failed">Failed</option>
                    </select>
                    <select id="track-filter" onchange="refreshExperiments()">
                        <option value="">Track</option>
                    </select>
                </div>
                <div id="experiments-list" class="experiments-list">
                    <p class="placeholder">Loading...</p>
                </div>
            </div>

            <!-- Queue View -->
            <div id="queue-view" class="panel-view">
                <div class="queue-header">
                    <span class="queue-title">Queue</span>
                    <span id="queue-state-badge" class="queue-state-badge">active</span>
                </div>
                <div id="queue-content" class="queue-content">
                    <p class="placeholder">Loading...</p>
                </div>
            </div>

            <!-- View Switcher -->
            <div class="view-switcher">
                <button class="view-btn active" data-view="experiments" onclick="switchView('experiments')">Experiments</button>
                <button class="view-btn" data-view="queue" onclick="switchView('queue')">Queue</button>
            </div>
        </section>

        <section class="detail-panel">
            <div class="panel-header">
                <h2 id="detail-title">Details</h2>
            </div>

            <div class="meta-chart-block">
                <div class="meta-row-wrapper">
                    <div id="meta-row-container"></div>
                    <div class="chart-view-switcher" id="chart-view-switcher">
                        <button class="chart-view-btn" data-view="heatmap" onclick="switchChartView('heatmap')" title="Heatmap view">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="3" y="3" width="5" height="5" rx="1"/><rect x="10" y="3" width="5" height="5" rx="1"/><rect x="17" y="3" width="5" height="5" rx="1"/>
                                <rect x="3" y="10" width="5" height="5" rx="1"/><rect x="10" y="10" width="5" height="5" rx="1"/><rect x="17" y="10" width="5" height="5" rx="1"/>
                                <rect x="3" y="17" width="5" height="5" rx="1"/><rect x="10" y="17" width="5" height="5" rx="1"/><rect x="17" y="17" width="5" height="5" rx="1"/>
                            </svg>
                        </button>
                        <button class="chart-view-btn" data-view="residual" onclick="switchChartView('residual')" title="Residual view">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="2" y="11" width="20" height="2"/>
                                <path d="M4 8 L8 5 L12 9 L16 4 L20 7" stroke="currentColor" stroke-width="2" fill="none"/>
                                <path d="M4 16 L8 19 L12 15 L16 20 L20 17" stroke="currentColor" stroke-width="2" fill="none"/>
                            </svg>
                        </button>
                        <button class="chart-view-btn" data-view="line" onclick="switchChartView('line')" title="Line graph view">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 17 L8 12 L12 14 L17 8 L21 10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                                <circle cx="3" cy="17" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="12" cy="14" r="2"/><circle cx="17" cy="8" r="2"/><circle cx="21" cy="10" r="2"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="chart-container">
                    <div class="chart-body">
                        <div id="chart-legend" class="chart-legend"></div>
                        <div class="chart-canvas-wrap">
                            <canvas id="loss-chart"></canvas>
                            <div id="chart-heatmap-container"></div>
                        </div>
                    </div>
                    <div class="chart-toolbar">
                        <div id="chart-range" class="chart-range"></div>
                        <div class="chart-toolbar-btns">
                            <input type="text" id="chart-copy-title" class="chart-copy-title" placeholder="title (optional)" title="Title for copied image">
                            <button class="chart-copy-btn" onclick="copyChartAsImage()" title="Copy chart as image">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                            </button>
                            <button class="chart-fullscreen-btn" onclick="toggleChartFullscreen()" title="Toggle fullscreen">
                                <svg class="expand-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                                </svg>
                                <svg class="collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="experiment-details" class="details-content">
                <p class="placeholder">Select an experiment to view details</p>
            </div>

            <div class="metrics-panel">
                <div id="metrics-table" class="metrics-table">
                    <h3>Metrics History</h3>
                    <p class="placeholder">Select an experiment to view metrics</p>
                </div>
            </div>

            <div class="diff-notes-panel">
                <div class="diff-notes-tabs">
                    <button class="diff-notes-tab active" data-tab="diff" onclick="switchDiffNotesTab('diff')">Code Diff</button>
                    <button class="diff-notes-tab" data-tab="notes" onclick="switchDiffNotesTab('notes')">Notes</button>
                </div>
                <div id="diff-tab-content" class="diff-notes-content active">
                    <div id="diff-content" class="diff-content">
                        <p class="placeholder">Select an experiment to view code diff</p>
                    </div>
                </div>
                <div id="notes-tab-content" class="diff-notes-content">
                    <div id="notes-content" class="notes-content">
                        <p class="placeholder">Select an experiment to view notes</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="mobile-nav">
        <button class="mobile-nav-btn active" data-panel="experiments" onclick="switchMobilePanel('experiments')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
            </svg>
            <span>Experiments</span>
        </button>
        <button class="mobile-nav-btn" data-panel="queue" onclick="switchMobilePanel('queue')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/>
            </svg>
            <span>Queue</span>
        </button>
        <button class="mobile-nav-btn" data-panel="detail" onclick="switchMobilePanel('detail')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
            <span>Details</span>
        </button>
    </nav>

    <!-- JS modules (order matters: state first, then utils, then chart/runs, then app last) -->
    <script src="/static/js/state.js?v={{ v }}"></script>
    <script src="/static/js/utils.js?v={{ v }}"></script>
    <script src="/static/js/chart.js?v={{ v }}"></script>
    <script src="/static/js/runs.js?v={{ v }}"></script>
    <script src="/static/js/app.js?v={{ v }}"></script>
</body>
</html>
